{% extends 'base.html' %}
{% block title %}Entrar — ExploraBrasil{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center" style="background:linear-gradient(135deg,#1a1a2e,#0f3460)">
  <div class="container" style="max-width:420px">
    <div class="text-center mb-4">
      <a href="/" class="text-decoration-none">
        <i class="bi bi-compass text-success" style="font-size:3rem"></i>
        <h3 class="text-white fw-bold mt-1">ExploraBrasil</h3>
      </a>
    </div>
    <div class="card border-0 shadow-lg rounded-4">
      <div class="card-body p-4">
        <h4 class="fw-bold text-center mb-4">Bem-vindo de volta</h4>
        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Usuário ou e-mail</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-person text-muted"></i></span>
              <input type="text" name="username" class="form-control" placeholder="seu_usuario" autofocus required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Senha</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-lock text-muted"></i></span>
              <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
          </div>
          <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
          </button>
        </form>
        <hr class="my-3">
        <p class="text-center text-muted mb-0 small">
          Não tem conta? <a href="/cadastro/" class="text-success fw-semibold">Cadastre-se grátis</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
